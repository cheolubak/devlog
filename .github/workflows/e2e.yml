name: E2E Tests

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_DYNAMIC_API_URL: http://localhost:3000/api
          NEXT_PUBLIC_EXTERNAL_API_URL: http://localhost:8080
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: placeholder
          NEXT_PUBLIC_SENTRY_DSN: ""
          NEXT_PUBLIC_SENTRY_ORG: ""
          NEXT_PUBLIC_SENTRY_PROJECT: ""
          NEXT_PUBLIC_HOME: http://localhost:3000

      - name: Start mock API server
        run: node apps/client/cypress/mock-server.cjs &
        env:
          MOCK_PORT: 8080

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          install: false
          start: pnpm --filter @devlog/client start
          wait-on: http://localhost:3000
          working-directory: apps/client
          browser: chrome

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: apps/client/cypress/screenshots

      - name: Upload videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos
          path: apps/client/cypress/videos
